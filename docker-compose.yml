services:

  postgres:
    image: postgres:16
    container_name: postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=10
      -c max_wal_senders=10
      -c max_slot_wal_keep_size=1024
      -c wal_keep_size=256
    networks:
      - data_platform_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v23.3.10
    container_name: redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    networks:
      - data_platform_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 10s
      retries: 10

  debezium:
    image: debezium/connect:2.5
    container_name: debezium
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_statuses
    networks:
      - data_platform_network
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    env_file: .env
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse123
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "18123:8123"
      - "19000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./sql/02_clickhouse_dummy.sql:/docker-entrypoint-initdb.d/02_clickhouse_dummy.sql:ro
    networks:
      - data_platform_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: redis
    networks:
      - data_platform_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: superset
    env_file: .env
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
      - ./superset/init.sh:/app/init.sh
    networks:
      - data_platform_network
    restart: unless-stopped
    command: ["/bin/sh", "/app/init.sh"]

  init:
    build:
      context: .
      dockerfile: Dockerfile.init
    container_name: platform_init
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      debezium:
        condition: service_started
    volumes:
      - ./sql:/sql
      - ./sh:/sh
    environment:
      PGPASSWORD: postgres123
    networks:
      - data_platform_network
    restart: "no"
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        set -euo pipefail
        echo "⏳ Iniciando configuración de la plataforma..."

        echo "🗄️  Creando base de datos para Superset..."
        psql -h postgres -U postgres -d postgres -c "CREATE DATABASE superset;" || true
        echo "✅ Base superset lista"

        echo "📦 Creando tablas dummy en PostgreSQL..."
        until psql -h postgres -U postgres -d postgres -f /sql/01_postgres_dummy.sql; do
          echo "⏳ Esperando PostgreSQL..."
          sleep 2
        done
        echo "✅ PostgreSQL listo"

        echo "🏗️  Esperando ClickHouse..."
        until curl -sf "http://clickhouse:8123/ping" | grep -q Ok; do
          echo "⏳ Esperando ClickHouse..."
          sleep 2
        done
        echo "✅ ClickHouse listo"

        echo "🔌 Registrando conectores Debezium..."
        bash /sh/03_debezium_connectors.sh || true
        echo "✅ Debezium listo"

        echo ""
        echo "🚀 Plataforma lista!"

networks:
  data_platform_network:
    driver: bridge

volumes:
  postgres_data:
  clickhouse_data:
