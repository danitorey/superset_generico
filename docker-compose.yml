services:

  postgres:
    image: postgres:16
    container_name: postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=10
      -c max_wal_senders=10
      -c max_slot_wal_keep_size=1024
      -c wal_keep_size=256
    networks:
      - data_platform_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v23.3.10
    container_name: redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    networks:
      - data_platform_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 10s
      retries: 10

  debezium:
    image: debezium/connect:2.5
    container_name: debezium
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_statuses
    networks:
      - data_platform_network
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    env_file: .env
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse123
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "18123:8123"
      - "19000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./sql/02_clickhouse_dummy.sql:/docker-entrypoint-initdb.d/02_clickhouse_dummy.sql:ro
      - ./clickhouse/config.d/memory.xml:/etc/clickhouse-server/config.d/memory.xml:ro
      - ./sql/05_rls_setup.sql:/docker-entrypoint-initdb.d/05_rls_setup.sql:ro
    networks:
      - data_platform_network
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: redis
    networks:
      - data_platform_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: superset
    env_file: .env
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
      - ./superset/init.sh:/app/init.sh
      - ./superset/exports:/app/exports:ro
      - ./superset/alertas_reportes:/app/alertas_reportes:ro
      - ./superset/create_clickhouse_connection.py:/app/create_clickhouse_connection.py:ro
      - ./superset/import_all_final.sh:/app/import_all_final.sh:ro
      - ./superset/import_alerts_reports_final.py:/app/import_alerts_reports_final.py:ro
    networks:
      - data_platform_network
    restart: unless-stopped
    command: ["/bin/sh", "/app/init.sh"]

  superset-worker:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: superset_worker
    env_file: .env
    command: celery --app=superset.tasks.celery_app:app worker --loglevel=INFO --concurrency=2
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - data_platform_network
    restart: unless-stopped

  superset-beat:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: superset_beat
    env_file: .env
    command: celery --app=superset.tasks.celery_app:app beat --loglevel=INFO --schedule=/tmp/celerybeat-schedule
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - data_platform_network
    restart: unless-stopped

  init:
    build:
      context: .
      dockerfile: Dockerfile.init
    container_name: platform_init
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_started
      debezium:
        condition: service_started
      superset:
        condition: service_started
    volumes:
      - ./sql:/sql
      - ./sh:/sh
      - ./scripts:/scripts
      - ./superset/alertas_reportes:/app/alertas_reportes:ro
      - ./superset/exports:/app/exports:ro
    environment:
      PGPASSWORD: postgres123
      CLICKHOUSE_PASSWORD: clickhouse123
      SUPERSET_ADMIN_USER: admin
      SUPERSET_ADMIN_PASSWORD: admin
    networks:
      - data_platform_network
    restart: "no"
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        set -euo pipefail
        echo "⏳ Iniciando configuración de la plataforma..."
        echo "🗄️ Creando base de datos para Superset..."
        psql -h postgres -U postgres -d postgres -c "CREATE DATABASE superset;" || true
        echo "✅ Base superset lista"
        echo "📦 Creando tablas dummy en PostgreSQL..."
        until psql -h postgres -U postgres -d postgres -f /sql/01_postgres_dummy.sql; do
          echo "⏳ Esperando PostgreSQL..."
          sleep 2
        done
        echo "✅ PostgreSQL listo"
        echo "🏗️ Esperando ClickHouse..."
        until curl -sf "http://clickhouse:8123/ping" | grep -q Ok; do
          echo "⏳ Esperando ClickHouse..."
          sleep 2
        done
        echo "✅ ClickHouse listo"
        echo "🔌 Registrando conectores Debezium..."
        bash /sh/03_debezium_connectors.sh || true
        echo "✅ Debezium listo"
        echo "⏳ Esperando que Superset esté listo..."
        until curl -fsS "http://superset:8088/health" | grep -q "OK"; do
          echo "⏳ Superset no listo aún..."
          sleep 5
        done
        echo "✅ Superset listo"
        echo "👥 Creando usuarios en Superset..."
        python3 /scripts/create_superset_users.py || true
        echo "✅ Usuarios creados"
        echo "🔐 Configurando RLS nativo en Superset..."
        python3 /scripts/setup_superset_rls.py || true
        echo "✅ RLS nativo configurado"
        echo "📦 Parcheando ZIPs con password de ClickHouse..."
        mkdir -p /tmp/exports_patched
        python3 << 'PYEOF'
        import zipfile, os, re, glob
        exports_dir = "/app/exports"
        output_dir = "/tmp/exports_patched"
        os.makedirs(output_dir, exist_ok=True)
        CLICKHOUSE_PASSWORD = os.getenv("CLICKHOUSE_PASSWORD", "clickhouse123")
        for zip_path in glob.glob(os.path.join(exports_dir, "*.zip")):
            zip_name = os.path.basename(zip_path)
            src = zip_path
            dst = os.path.join(output_dir, zip_name)
            with zipfile.ZipFile(src, 'r') as zin:
                with zipfile.ZipFile(dst, 'w', zipfile.ZIP_DEFLATED) as zout:
                    for item in zin.infolist():
                        data = zin.read(item.filename)
                        if item.filename.endswith("databases/ClickHouse.yaml"):
                            content = data.decode("utf-8")
                            content = content.replace("XXXXXXXXXX", CLICKHOUSE_PASSWORD)
                            content = content.replace("clickhouse:8123/default", "clickhouse:8123/analytics")
                            if "^password:" not in content:
                                content = re.sub(r"(sqlalchemy_uri:.*)", r"\1\npassword: " + CLICKHOUSE_PASSWORD, content)
                            data = content.encode("utf-8")
                            print(f"  🔑 Parcheado: {zip_name} -> {item.filename}")
                        zout.writestr(item, data)
        print("✅ Todos los ZIPs parcheados")
        PYEOF
        echo "📊 Importando dashboards..."
        for ZIP in /tmp/exports_patched/*.zip; do
          if [ -f "$ZIP" ]; then
            echo "  📥 Importando $(basename "$ZIP")..."
            superset import-dashboards -p "$ZIP" --username admin || true
          fi
        done
        echo "✅ Dashboards importados"
        echo "📢 Publicando dashboards..."
        python3 /scripts/publish_dashboards.py || true
        echo "✅ Dashboards publicados"
        echo "🔔 Importando Alertas y Reportes..."
        python3 /scripts/import_alerts_reports_final.py || true
        echo "📊 Configurando Dashboard de Monitoreo..."
        python3 /scripts/setup_monitoring_dashboard.py || true
        echo ""
        echo "🚀 Plataforma lista!"
        echo ""
        echo "🔐 RLS activo - Usuarios para pruebas:"
        echo "   analista_norte / norte123 → solo ve región NORTE"
        echo "   analista_sur / sur123 → solo ve región SUR"
        echo "   analista_este / este123 → solo ve región ESTE"
        echo "   analista_oeste / oeste123 → solo ve región OESTE"
        echo "   gerente_ventas / gerente123 → ve todas las regiones"

networks:
  data_platform_network:
    driver: bridge

volumes:
  postgres_data:
  clickhouse_data:
